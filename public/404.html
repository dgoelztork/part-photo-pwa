<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Part Receiving</title>
    <script type="text/javascript">
      // SPA fallback for GitHub Pages: BrowserRouter URLs like
      // /part-photo-pwa/receive/abc resolve to a missing file and 404. Pages
      // serves this 404.html, which rewrites the URL into a single redirect
      // query and bounces to the SPA root. index.html restores the original
      // path before React mounts.
      //
      // Adapted from rafgraph/spa-github-pages.
      var pathSegmentsToKeep = 1; // keep "/part-photo-pwa" prefix
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
