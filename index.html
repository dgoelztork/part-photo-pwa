<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- PWA: Apple-specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Receiving" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180x180.png" />

    <!-- PWA: General -->
    <meta name="theme-color" content="#1a73e8" />
    <link rel="icon" href="./favicon.ico" />

    <title>Part Receiving</title>

    <!--
      SPA fallback decoder. Pairs with public/404.html on GitHub Pages:
      404.html encodes the deep-linked path into ?p=... and redirects here;
      this script decodes it back into the URL before React Router mounts.
    -->
    <script type="text/javascript">
      (function () {
        var l = window.location;
        if (l.search.indexOf("?p=") !== 0 && l.search.indexOf("&p=") < 0) return;
        var q = {};
        l.search
          .slice(1)
          .split("&")
          .forEach(function (pair) {
            var eq = pair.indexOf("=");
            if (eq < 0) return;
            var k = pair.slice(0, eq);
            var v = pair.slice(eq + 1).replace(/~and~/g, "&");
            q[k] = v;
          });
        if (q.p !== undefined) {
          window.history.replaceState(
            null,
            null,
            l.pathname.replace(/\/$/, "") +
              (q.p || "") +
              (q.q ? "?" + q.q : "") +
              l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
